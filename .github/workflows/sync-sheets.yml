name: Sync Google Sheets

on:
  workflow_dispatch:   # manual trigger only

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch actions sheet
        run: |
          curl -f -s "https://script.google.com/macros/s/AKfycbyMt6mx-txafe7ZsIXCBs1omcFFNE_7X_HqSwLNT1KEy5yo0yJO-pmZD_VboRAgfkFN/exec" \
          | jq '.data' > data/actions.json

      - name: Fetch actions_mod sheet
        run: |
          curl -f -s "https://script.google.com/macros/s/AKfycbw8vOIbhRNaOCvjJBZZ-nKAvWWhLyTIGRzwk9FXS4DjKSjbnZoe4FXj8EVIKD0o0kX-/exec" \
          | jq '.data' > data/actions_mod.json

      - name: Fetch cities sheet
        run: |
          curl -f -s "https://script.google.com/macros/s/AKfycbxPsrugCMqZJOTjd2oOO3H6FNi_xKvNSkruwRfjoO51dhdTFTxzXJp0KF9OEvcMuEoK/exec" \
          | jq '.data' > data/cities.json

      - name: Validate JSON
        run: |
          jq empty data/actions.json
          jq empty data/actions_mod.json
          jq empty data/cities.json

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/*.json

          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "Update sheet data"
            git push
          fi